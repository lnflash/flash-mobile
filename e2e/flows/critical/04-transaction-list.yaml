appId: com.lnflash
---
# Critical path: transaction list loads (read-only, safe)
- launchApp:
    clearState: false
- waitForAnimationToEnd
- takeScreenshot: "04-home-before-tx"
# Tap on transaction history / activity
- tapOn:
    anyOf:
      - text: "Transactions"
      - text: "Activity"
      - text: "History"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "04-transaction-list"
# Transaction list or empty state should be visible
- assertVisible:
    anyOf:
      - text: "Transactions"
      - text: "No transactions"
      - text: "Activity"
      - text: "Send"
- takeScreenshot: "04-transaction-list-verified"
