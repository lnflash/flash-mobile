name: iOS Alt Deploy

on:
  push:
    tags:
      - "ios-alt/v*"
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        type: choice
        options:
          - beta_alt
          - release_alt
      ref:
        description: "REQUIRED for release_alt: exact commit/tag that was beta-tested (e.g. ios-alt/v0.6.2-46). Leave blank for beta_alt — defaults to the branch selected above, which for release_alt silently ships main's current tip instead of a tested build."
        required: false
        type: string

concurrency:
  group: ios-alt-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy iOS Alt
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      # Runs before Checkout: enforcement, not just documentation. The ref
      # input's description said "REQUIRED for release_alt", but
      # required: false means GitHub's UI never enforces that — a
      # release_alt dispatch left blank would otherwise silently build
      # whatever the "Use workflow from" selector resolved to (usually main's
      # tip) instead of the exact beta-tested commit, straight through to an
      # App Store upload.
      - name: Validate release ref
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_LANE: ${{ github.event.inputs.lane }}
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          if [ "$INPUT_LANE" = "release_alt" ] && [ -z "$INPUT_REF" ]; then
            echo "::error::lane=release_alt requires the ref input (exact beta-tested commit/tag, e.g. ios-alt/v0.6.2-46) — refusing to build whatever ref the workflow-from selector picked. Re-run with ref set." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Tag pushes: github.ref is the tag itself, correct by default.
          # workflow_dispatch: falls back to whichever branch was picked in
          # the "Use workflow from" selector (usually main's tip) unless the
          # ref input above pins something else — see that input's
          # description for why release_alt dispatches should always set it,
          # and the Validate release ref step above for why it can't be skipped.
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1 (v1.319.0) — floating branch, not a tag; re-pin periodically
        with:
          ruby-version: "3.2"

      - name: Install Ruby dependencies
        # --frozen: hard-fail if Gemfile/Gemfile.lock disagree, instead of
        # silently re-resolving an unaudited gem graph in the job that holds
        # every signing/upload credential.
        run: bundle install --frozen --jobs 4 --retry 3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Create .env from secrets
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
        run: printenv DOT_ENV > .env

      - name: Create GoogleService-Info.plist from secrets
        env:
          GOOGLE_SERVICE_INFO_PLIST_ALT: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_ALT }}
        run: |
          mkdir -p ios/LNFlash-Alt
          printenv GOOGLE_SERVICE_INFO_PLIST_ALT > ios/LNFlash-Alt/GoogleService-Info.plist

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@1242409711ff5721add51979e9e11e23ebb7e5a4 # v1
        with:
          # Pinned, not latest-stable — see build-check.yml's Setup Xcode step
          # for why. Keep this in sync with ios-deploy.yml and build-check.yml.
          xcode-version: "26.3"

      - name: Set NODE_BINARY for Xcode build scripts
        run: |
          NODE_PATH=$(command -v node)
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local

      - name: Determine lane
        id: lane
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_LANE: ${{ github.event.inputs.lane }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            case "$INPUT_LANE" in
              beta_alt|release_alt) ;;
              *) echo "::error::Unrecognized lane input: $INPUT_LANE" >&2; exit 1 ;;
            esac
            echo "lane=$INPUT_LANE" >> "$GITHUB_OUTPUT"
          else
            echo "lane=beta_alt" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Fastlane
        env:
          CI: "true"
          LANE: ${{ steps.lane.outputs.lane }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: bundle exec fastlane ios "$LANE"

      - name: Push version bump
        if: success()
        run: |
          # Tag-triggered runs are a detached HEAD, so target main explicitly.
          # The GITHUB_TOKEN push cannot re-trigger this workflow (Actions
          # anti-recursion), so the bump tag never loops.
          #
          # Retried: this repo's three deploy workflows run in parallel and
          # each ends with exactly this push, so a coordinated multi-platform
          # release can race here — by this point the store upload has
          # already succeeded, so a plain non-fast-forward rejection must not
          # fail the job (that reads as "nothing shipped" when it actually
          # did, and invites an operator to re-run the whole lane, including
          # a second real upload).
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git rebase -X theirs --autostash origin/main
            if git push origin HEAD:main --follow-tags; then
              exit 0
            fi
            echo "::warning::Push attempt $attempt failed, retrying..." >&2
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push version bump after 5 attempts — the store upload above already succeeded; push manually or re-run just this step." >&2
          exit 1

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-alt-build-artifacts
          path: |
            build/
            fastlane/report.xml
            ~/Library/Logs/gym/
