name: iOS Alt Deploy

on:
  push:
    tags:
      - "ios-alt/v*"
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        type: choice
        options:
          - beta_alt
          - release_alt

concurrency:
  group: ios-alt-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy iOS Alt
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1 (v1.319.0) — floating branch, not a tag; re-pin periodically
        with:
          ruby-version: "3.2"

      - name: Install Ruby dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Create .env from secrets
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
        run: printenv DOT_ENV > .env

      - name: Create GoogleService-Info.plist from secrets
        env:
          GOOGLE_SERVICE_INFO_PLIST_ALT: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_ALT }}
        run: |
          mkdir -p ios/LNFlash-Alt
          printenv GOOGLE_SERVICE_INFO_PLIST_ALT > ios/LNFlash-Alt/GoogleService-Info.plist

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@1242409711ff5721add51979e9e11e23ebb7e5a4 # v1
        with:
          xcode-version: latest-stable

      - name: Set NODE_BINARY for Xcode build scripts
        run: |
          NODE_PATH=$(command -v node)
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local

      - name: Determine lane
        id: lane
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_LANE: ${{ github.event.inputs.lane }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            case "$INPUT_LANE" in
              beta_alt|release_alt) ;;
              *) echo "::error::Unrecognized lane input: $INPUT_LANE" >&2; exit 1 ;;
            esac
            echo "lane=$INPUT_LANE" >> "$GITHUB_OUTPUT"
          else
            echo "lane=beta_alt" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Fastlane
        env:
          CI: "true"
          LANE: ${{ steps.lane.outputs.lane }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: bundle exec fastlane ios "$LANE"

      - name: Push version bump
        if: success()
        run: |
          # Tag-triggered runs are a detached HEAD, so target main explicitly.
          # The GITHUB_TOKEN push cannot re-trigger this workflow (Actions
          # anti-recursion), so the bump tag never loops.
          git fetch origin main
          git rebase -X theirs --autostash origin/main
          git push origin HEAD:main --follow-tags

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-alt-build-artifacts
          path: |
            build/
            fastlane/report.xml
            ~/Library/Logs/gym/
