name: "Test"
on:
  pull_request:
    branches: [main]
jobs:
  check-code:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: yarn install
      - name: Run test
        run: yarn test
