name: "Test"
on:
  push:
    branches: [feat/fygaro]
  pull_request:
    branches: [main, feat/fygaro]
jobs:
  check-code:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - run: yarn install
      - name: Run test
        run: yarn test
