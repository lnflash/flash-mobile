name: Update Cocoapods Dependencies
on:
  push:
    branches:
      - dependabot/npm_and_yarn/**
  pull_request:
    branches:
      - dependabot/npm_and_yarn/**

permissions:
  contents: write

jobs:
  run:
    name: Run pod install
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GT }}
          ref: ${{ github.head_ref }}
          # This job needs secrets.GT (not the auto-scoped GITHUB_TOKEN)
          # specifically because a GITHUB_TOKEN-authored push can't
          # retrigger workflows, which stefanzweifel/git-auto-commit-action
          # below relies on. Still don't leave it sitting in .git/config
          # through yarn/pod install, both of which run arbitrary
          # third-party code (npm postinstall hooks, CocoaPods podspec
          # Ruby including prepare_command hooks) — git-auto-commit-action
          # gets its own token: below and doesn't need this one persisted.
          persist-credentials: false

      - name: Install Packages
        run: yarn install --non-interactive --frozen-lockfile

      - name: Cache node_modules and Pods
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            node_modules
            ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Cocoapods Packages
        run: pushd ios && pod install --repo-update --verbose && popd

      - uses: stefanzweifel/git-auto-commit-action@480e111bf8274f3bbd429aef51504f71c808e3e4 # v4.1.1
        with:
          commit_message: Bump Cocoapods Packages
          branch: ${{ github.head_ref }}
          token: ${{ secrets.GT }}
