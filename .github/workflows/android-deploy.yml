name: Android Deploy

on:
  push:
    tags:
      - "android/v*"
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        type: choice
        options:
          - beta
          - release
          - promote_to_beta
      ref:
        description: "REQUIRED for release: exact commit/tag that was beta-tested (e.g. android/v0.6.2-46). Leave blank for beta or promote_to_beta (the latter doesn't build from source at all) — release defaults to the branch selected above, which silently ships main's current tip instead of a tested build."
        required: false
        type: string

concurrency:
  group: android-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy Android
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # Runs before Checkout: enforcement, not just documentation. The ref
      # input's description said "REQUIRED for release", but required: false
      # means GitHub's UI never enforces that — a release dispatch left blank
      # would otherwise silently build whatever the "Use workflow from"
      # selector resolved to (usually main's tip) instead of the exact
      # beta-tested commit, straight through to a live 10%-rollout Play Store
      # upload. promote_to_beta doesn't build from source at all, so it's
      # exempt (matches the ref input's own description).
      - name: Validate release ref
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_LANE: ${{ github.event.inputs.lane }}
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          if [ "$INPUT_LANE" = "release" ] && [ -z "$INPUT_REF" ]; then
            echo "::error::lane=release requires the ref input (exact beta-tested commit/tag, e.g. android/v0.6.2-46) — refusing to build whatever ref the workflow-from selector picked. Re-run with ref set." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Tag pushes: github.ref is the tag itself, correct by default.
          # workflow_dispatch: falls back to whichever branch was picked in
          # the "Use workflow from" selector (usually main's tip) unless the
          # ref input above pins something else — see that input's
          # description for why release dispatches should always set it, and
          # the Validate release ref step above for why it can't be skipped.
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Validate release ref is not main's tip
        # The earlier "Validate release ref" step only rejects a BLANK ref —
        # it can't tell a real beta-tested tag apart from any other non-empty
        # string that currently happens to resolve to main's tip, like the
        # literal branch name "main". That's functionally identical to
        # leaving the field blank, the exact scenario this whole guardrail
        # exists to prevent. Checked here, after checkout, using plain local
        # git state (fetch-depth: 0 above already has full history) instead
        # of trying to pre-validate a ref format that's also allowed to be a
        # raw commit SHA per the input's own description.
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.lane == 'release'
        run: |
          git fetch origin main
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ]; then
            echo "::error::The checked-out ref resolves to the exact same commit as main's current tip — indistinguishable from shipping main's untested tip. Set ref to the exact beta-tested tag (e.g. android/v0.6.2-46), not a moving branch name like 'main'." >&2
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "yarn"

      - name: Create .env from secrets
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
        run: printenv DOT_ENV > .env

      - name: Create google-services.json from secrets
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printenv GOOGLE_SERVICES_JSON > android/app/google-services.json

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1 (v1.319.0) — floating branch, not a tag; re-pin periodically
        with:
          ruby-version: "3.2"

      - name: Install Ruby dependencies
        # --frozen: hard-fail if Gemfile/Gemfile.lock disagree, instead of
        # silently re-resolving an unaudited gem graph in the job that holds
        # every signing/upload credential.
        run: bundle install --frozen --jobs 4 --retry 3

      - name: Setup JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printenv ANDROID_KEYSTORE_BASE64 | base64 --decode > android/app/release-keystore.jks

      - name: Create gradle.properties
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Every non-secret line here MUST also be in
          # android/gradle.properties.example (build-check.yml builds from
          # that file as a debug-build proxy for this config) — keep them in
          # sync or a green build-check stops proving anything about the real
          # release build.
          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=2g
          android.useAndroidX=true
          reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64
          newArchEnabled=true
          hermesEnabled=true
          android.aapt2Version=8.6.1-11315950
          GeetestModule_compileSdkVersion=android-31
          GeetestModule_targetSdkVersion=31
          GeetestModule_minSdkVersion=26
          GeetestModule_buildToolsVersion=31.0.0
          MYAPP_UPLOAD_STORE_FILE=release-keystore.jks
          EOF
          {
            echo "MYAPP_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "MYAPP_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "MYAPP_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> android/gradle.properties

      - name: Setup Google Play JSON key
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: printenv GOOGLE_PLAY_JSON_KEY > google-play-key.json

      - name: Determine lane
        id: lane
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_LANE: ${{ github.event.inputs.lane }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            case "$INPUT_LANE" in
              beta|release|promote_to_beta) ;;
              *) echo "::error::Unrecognized lane input: $INPUT_LANE" >&2; exit 1 ;;
            esac
            echo "lane=$INPUT_LANE" >> "$GITHUB_OUTPUT"
          else
            echo "lane=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Fastlane
        env:
          CI: "true"
          LANE: ${{ steps.lane.outputs.lane }}
          GOOGLE_PLAY_JSON_KEY_PATH: google-play-key.json
        run: bundle exec fastlane android "$LANE"

      - name: Push version bump
        if: success() && steps.lane.outputs.lane != 'promote_to_beta'
        run: |
          # Tag-triggered runs are a detached HEAD, so target main explicitly.
          # The GITHUB_TOKEN push cannot re-trigger this workflow (Actions
          # anti-recursion), so the bump tag never loops.
          #
          # Retried: this repo's three deploy workflows run in parallel and
          # each ends with exactly this push, so a coordinated multi-platform
          # release can race here — by this point the store upload has
          # already succeeded, so a plain non-fast-forward rejection must not
          # fail the job (that reads as "nothing shipped" when it actually
          # did, and invites an operator to re-run the whole lane, including
          # a second real upload).
          #
          # Re-tag on every iteration: rebase moves HEAD to a new SHA but
          # never touches existing tag refs, so a tag created by this run's
          # Fastlane lane (add_git_tag, always annotated) still points at the
          # pre-rebase commit after a losing race. --follow-tags silently
          # skips it on retry (it already "exists" on the remote by name from
          # the earlier partial push), leaving it permanently orphaned from
          # main. -f -a re-annotates it onto the rebased HEAD every time, and
          # it's pushed explicitly with --force — safe here specifically
          # because nothing outside this same job could have observed or
          # relied on a tag that was only just accidentally half-published
          # moments earlier by this same retry loop. The branch push stays a
          # normal, non-force push.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            release_tags=$(git tag --points-at HEAD)
            git rebase -X theirs --autostash origin/main
            for t in $release_tags; do
              git tag -f -a "$t" HEAD -m "$t"
            done
            push_ok=true
            git push origin HEAD:main || push_ok=false
            for t in $release_tags; do
              git push origin "refs/tags/$t" --force || push_ok=false
            done
            if [ "$push_ok" = true ]; then
              exit 0
            fi
            echo "::warning::Push attempt $attempt failed, retrying..." >&2
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push version bump after 5 attempts. The store upload above ALREADY SUCCEEDED — do NOT use GitHub's 'Re-run failed jobs', it reruns this entire job from Checkout onward, including a SECOND real live Play Store rollout. To recover: on your own machine, fetch origin/main, manually recreate this run's version-bump commit (see the version/build numbers logged earlier in this job) and its git tag, then 'git push origin HEAD:main --follow-tags' from that clean checkout. Do not re-dispatch this workflow for this release." >&2
          exit 1

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f android/app/release-keystore.jks
          rm -f android/app/google-services.json
          rm -f google-play-key.json

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-artifacts
          path: |
            android/app/build/outputs/
            fastlane/report.xml
