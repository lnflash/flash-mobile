name: Build Check

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn eslint . --ext .js,.jsx,.ts,.tsx

  ios-build:
    name: iOS Build Check
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1 (v1.319.0) — floating branch, not a tag; re-pin periodically
        with:
          ruby-version: "3.2"

      - name: Install Ruby dependencies
        # --frozen: hard-fail if Gemfile/Gemfile.lock disagree, instead of
        # silently re-resolving an unaudited gem graph.
        run: bundle install --frozen --jobs 4 --retry 3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install JS dependencies
        # --ignore-scripts: the postinstall hook (package.json) runs
        # `pod install` whenever `pod` is on PATH, which the earlier bundle
        # install step already put there on this runner — a full, unpinned,
        # non-deployment CocoaPods resolution whose result is immediately
        # discarded by the explicit --deployment pod install below. A
        # transient CocoaPods hiccup here would fail the job before the
        # real, deployment-verified pod install ever runs. Run only the
        # JS-relevant postinstall steps explicitly instead.
        run: |
          yarn install --frozen-lockfile --ignore-scripts
          yarn jetify
          yarn patch-package

      - name: Cache CocoaPods
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install CocoaPods
        # --deployment: mirrors the Fastfile's cocoapods(deployment: true) —
        # fail loudly on Podfile/Podfile.lock drift instead of re-resolving.
        run: bundle exec pod install --project-directory=ios --deployment

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@1242409711ff5721add51979e9e11e23ebb7e5a4 # v1
        with:
          # Pinned, not latest-stable: the runner image's own default Xcode is
          # scheduled to change (macos-15's "latest stable" resolution has
          # moved before, per this repo's own Xcode-26-migration commits) —
          # an untested toolchain flip must never land silently on a routine
          # build. Bump deliberately, in the same PR each time all three
          # xcode-version pins are updated together.
          xcode-version: "26.3"

      - name: Set NODE_BINARY for Xcode build scripts
        run: |
          NODE_PATH=$(command -v node)
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local

      - name: Build iOS (Debug)
        run: |
          xcodebuild \
            -workspace ios/LNFlash.xcworkspace \
            -scheme LNFlash \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty --color

  android-build:
    name: Android Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "yarn"

      - name: Setup JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install JS dependencies
        # No Ruby/bundle setup in this job — nothing below it uses
        # bundle/fastlane (Android Debug builds go straight through
        # ./gradlew). Ruby/bundle setup was removed deliberately: it
        # installs the cocoapods gem (an unconditional Gemfile dependency)
        # onto this Linux runner's PATH, which makes package.json's
        # postinstall hook attempt a real `pod install` against ios/Podfile
        # — CocoaPods shells out to Xcode-only tooling (xcodebuild, xcrun)
        # that doesn't exist on Linux, so it always crashes and fails this
        # step. This exact bug already happened once in android-deploy.yml
        # (fixed there by dropping Ruby setup) before recurring here.
        run: yarn install --frozen-lockfile

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Setup gradle.properties
        run: cp android/gradle.properties.example android/gradle.properties

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Android (Debug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/
          retention-days: 7
