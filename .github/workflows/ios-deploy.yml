name: iOS Deploy

on:
  push:
    tags:
      - "ios/v*"
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        type: choice
        options:
          - beta
          - release
      ref:
        description: "REQUIRED for release: exact commit/tag that was beta-tested (e.g. ios/v0.6.2-46). Leave blank for beta — defaults to the branch selected above, which for release silently ships main's current tip instead of a tested build."
        required: false
        type: string

concurrency:
  group: ios-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy iOS
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      # Runs before Checkout: enforcement, not just documentation. The ref
      # input's description said "REQUIRED for release", but required: false
      # means GitHub's UI never enforces that — a release dispatch left blank
      # would otherwise silently build whatever the "Use workflow from"
      # selector resolved to (usually main's tip) instead of the exact
      # beta-tested commit, straight through to an App Store upload.
      - name: Validate release ref
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_LANE: ${{ github.event.inputs.lane }}
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          if [ "$INPUT_LANE" = "release" ] && [ -z "$INPUT_REF" ]; then
            echo "::error::lane=release requires the ref input (exact beta-tested commit/tag, e.g. ios/v0.6.2-46) — refusing to build whatever ref the workflow-from selector picked. Re-run with ref set." >&2
            exit 1
          fi

      # Moved before Checkout: this only depends on github.event_name/
      # github.event.inputs.lane, never on repo state, so there's no reason
      # to burn a full Checkout + toolchain install (~10-20 min, with
      # secrets already written to disk) on a dispatch with an unrecognized
      # lane value that was always going to fail here anyway — e.g. a typo
      # from a hand-built `gh workflow run` call, which bypasses the
      # dropdown's UI-only restriction.
      - name: Determine lane
        id: lane
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_LANE: ${{ github.event.inputs.lane }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            case "$INPUT_LANE" in
              beta|release) ;;
              *) echo "::error::Unrecognized lane input: $INPUT_LANE" >&2; exit 1 ;;
            esac
            echo "lane=$INPUT_LANE" >> "$GITHUB_OUTPUT"
          else
            echo "lane=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Tag pushes: github.ref is the tag itself, correct by default.
          # workflow_dispatch: falls back to whichever branch was picked in
          # the "Use workflow from" selector (usually main's tip) unless the
          # ref input above pins something else — see that input's
          # description for why release dispatches should always set it, and
          # the Validate release ref step above for why it can't be skipped.
          ref: feat/activate-store-deploy
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Validate release ref is a real beta tag
        # The earlier "Validate release ref" step only rejects a BLANK ref —
        # it can't tell a real beta-tested tag apart from any other non-empty
        # string. An earlier version of this step compared HEAD against
        # origin/main's tip, but that false-positives on the textbook
        # beta-then-release promotion: every successful beta run pushes its
        # version-bump commit AND tags it on main in the same step, so
        # main's tip and the beta tag being promoted are, by construction,
        # routinely the exact same commit — reproduced end-to-end in a
        # sandbox. Positively assert the thing that actually matters
        # instead: does HEAD carry a real, correctly-formatted ios/vX.Y.Z-N
        # tag. fetch-tags: true above ensures tags are actually present
        # locally to check, regardless of whether ref was a tag name or a
        # raw commit SHA.
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.lane == 'release'
        run: |
          if ! git tag --points-at HEAD | grep -qE '^ios/v[0-9]+\.[0-9]+\.[0-9]+-[0-9]+$'; then
            echo "::error::HEAD does not carry a real ios/vX.Y.Z-N beta tag — ref must point at the exact tag produced by a successful beta run (e.g. ios/v0.6.2-46), not a blank/branch ref or an untagged commit." >&2
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1 (v1.319.0) — floating branch, not a tag; re-pin periodically
        with:
          ruby-version: "3.2"

      - name: Install Ruby dependencies
        # --frozen: hard-fail if Gemfile/Gemfile.lock disagree, instead of
        # silently re-resolving an unaudited gem graph in the job that holds
        # every signing/upload credential.
        # BUNDLE_FORCE_RUBY_PLATFORM: Gemfile.lock's PLATFORMS is "ruby" only
        # and its CHECKSUMS only cover the generic ruby-platform gem builds.
        # Without this, Bundler transparently substitutes precompiled
        # platform-specific binaries (e.g. ffi) that have no matching
        # checksum entry, silently defeating --frozen's verification for
        # those gems on both the macOS and Linux runners here. Restores the
        # .bundle/config setting removed in ed3cb79a (which also dropped an
        # unrelated, CI-irrelevant BUNDLE_PATH line — not restored).
        env:
          BUNDLE_FORCE_RUBY_PLATFORM: "true"
        run: bundle install --frozen --jobs 4 --retry 3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "yarn"

      - name: Create .env from secrets
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
        run: printenv DOT_ENV > .env

      - name: Create GoogleService-Info.plist from secrets
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: printenv GOOGLE_SERVICE_INFO_PLIST > ios/LNFlash/GoogleService-Info.plist

      - name: Install JS dependencies
        # --ignore-scripts: the postinstall hook (package.json) runs
        # `pod install` whenever `pod` is on PATH, which the earlier bundle
        # install step already put there on this runner — a full, unpinned,
        # non-deployment CocoaPods resolution whose result is immediately
        # discarded by the Fastfile's own cocoapods(deployment: true) call
        # moments later. A transient CocoaPods hiccup here would fail the
        # job before the real, deployment-verified pod install ever runs.
        # Run only the JS-relevant postinstall steps explicitly instead.
        run: |
          yarn install --frozen-lockfile --ignore-scripts
          yarn jetify
          yarn patch-package

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@1242409711ff5721add51979e9e11e23ebb7e5a4 # v1
        with:
          # Pinned, not latest-stable — see build-check.yml's Setup Xcode step
          # for why. Keep this in sync with ios-alt-deploy.yml and
          # build-check.yml.
          xcode-version: "26.3"

      - name: Set NODE_BINARY for Xcode build scripts
        run: |
          NODE_PATH=$(command -v node)
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local

      - name: Run Fastlane
        env:
          CI: "true"
          LANE: ${{ steps.lane.outputs.lane }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: bundle exec fastlane ios "$LANE"

      - name: Push version bump
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # persist-credentials: false on Checkout above keeps the job's
          # contents:write token out of .git/config (and off disk) for the
          # entire build/sign/upload portion of this job — every dependency
          # install and every Fastlane action runs with no push capability
          # available to a compromised transitive script. Inject it fresh,
          # scoped to only this step, right before it's actually needed.
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # Tag-triggered runs are a detached HEAD, so target main explicitly.
          # The GITHUB_TOKEN push cannot re-trigger this workflow (Actions
          # anti-recursion), so the bump tag never loops.
          #
          # Retried: this repo's three deploy workflows run in parallel and
          # each ends with exactly this push, so a coordinated multi-platform
          # release can race here — by this point the store upload has
          # already succeeded, so a plain non-fast-forward rejection must not
          # fail the job (that reads as "nothing shipped" when it actually
          # did, and invites an operator to re-run the whole lane, including
          # a second real upload).
          #
          # Re-tag on every iteration: rebase moves HEAD to a new SHA but
          # never touches existing tag refs, so a tag created by this run's
          # Fastlane lane (add_git_tag, always annotated) still points at the
          # pre-rebase commit after a losing race. --follow-tags silently
          # skips it on retry (it already "exists" on the remote by name from
          # the earlier partial push), leaving it permanently orphaned from
          # main. -f -a re-annotates it onto the rebased HEAD every time, and
          # it's pushed explicitly with --force — safe here specifically
          # because nothing outside this same job could have observed or
          # relied on a tag that was only just accidentally half-published
          # moments earlier by this same retry loop. The branch push stays a
          # normal, non-force push.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            release_tags=$(git tag --points-at HEAD)
            git rebase -X theirs --autostash origin/main
            for t in $release_tags; do
              git tag -f -a "$t" HEAD -m "$t"
            done
            push_ok=true
            git push origin HEAD:main || push_ok=false
            for t in $release_tags; do
              git push origin "refs/tags/$t" --force || push_ok=false
            done
            if [ "$push_ok" = true ]; then
              exit 0
            fi
            echo "::warning::Push attempt $attempt failed, retrying..." >&2
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push version bump after 5 attempts. The store upload above ALREADY SUCCEEDED — do NOT use GitHub's 'Re-run failed jobs', it reruns this entire job from Checkout onward, including a SECOND real TestFlight upload. To recover: on your own machine, fetch origin/main, manually recreate this run's version-bump commit ONLY (see the version/build numbers logged earlier in this job), then 'git push origin HEAD:main' — commit only, no tag, no --follow-tags. Do NOT push a matching ios/vX.Y.Z-N tag from your own machine: only this job's own GITHUB_TOKEN-authenticated push is exempt from GitHub's tag-trigger anti-recursion protection, so a human-pushed tag would re-trigger a full new beta run and cause the exact second upload this message is warning against. Do not re-dispatch this workflow for this release." >&2
          exit 1

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-build-artifacts
          path: |
            build/
            fastlane/report.xml
            ~/Library/Logs/gym/
