name: "Check code"
on:
  push:
    branches: [feat/fygaro, main]
  pull_request:
    branches: [main, feat/fygaro]
jobs:
  check-code:
    name: Check Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - run: yarn install
      - name: Run check code
        run: yarn check-code
