  """Public key identifier (the keyId in fk_<keyId>_<secret>)"""
  keyId: String!
  name: String!

  """
  Per-key request rate limit (requests per minute). Null means the platform default applies.
  """
  rateLimitPerMinute: Int
  scopes: [ApiKeyScope!]!
